services:
  redis:
    image: redis:7
    container_name: nba-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16
    container_name: nba-postgres
    env_file:
      - .env
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_DB: "postgres"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # Ollama (LLM local). El backend habla por HTTP: OLLAMA_BASE_URL=http://ollama:11434
  #
  # GPU NVIDIA (Linux/WSL2): usar docker-compose.ollama-gpu.yml override.
  # Apple Silicon: mejor Ollama nativo en macOS (Metal). Poner en .env:
  #   OLLAMA_BASE_URL=http://host.docker.internal:11434
  # y quitar "ollama" de depends_on del backend si no levanta este servicio.
  ollama:
    image: ollama/ollama:latest
    container_name: nba-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    volumes:
      - ollama_data:/root/.ollama
    shm_size: "2gb"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nba-backend
    command: sh entrypoint.sh
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=Local
      - DJANGO_SETTINGS_MODULE=project.settings
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_DEFAULT_MODEL=llama3.1:8b
      - OLLAMA_SECOND_MODEL=mistral:7b
      - PYTHONMALLOC=malloc
      - MALLOC_ARENA_MAX=2
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      ollama:
        condition: service_healthy
    mem_limit: 2g
    mem_reservation: 1g
    memswap_limit: 3g
    restart: unless-stopped
    oom_kill_disable: false

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nba-celery-worker
    command: celery -A project worker -l info
    volumes:
      - .:/code
    env_file:
      - .env
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=project.settings
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nba-celery-beat
    command: celery -A project beat -l info
    volumes:
      - .:/code
    env_file:
      - .env
    environment:
      - DEBUG=1
      - DJANGO_SETTINGS_MODULE=project.settings
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/postgres
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
      - backend

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: nba-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    depends_on:
      - backend
      - redis

  grafana:
    image: grafana/grafana:11.3.0
    container_name: nba-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
  ollama_data:
